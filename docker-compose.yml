version: '3.8'

services:
  db_dev:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: ecom_dev
    ports:
      - "5432:5432"
    volumes:
      - dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ecom_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  db_test:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: ecom_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ecom_test"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  dev_data: